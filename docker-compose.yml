# ================================================================
# multi-llm-rotator — Docker Compose
# ================================================================
# Usage:
#   1. Copy .env.example to .env and add your API keys
#   2. Run: docker compose up -d
#      (or use setup.bat on Windows for One-Click setup)
# ================================================================

services:
  rotator:
    build:
      context: .
      dockerfile: Dockerfile
    image: multi-llm-rotator:latest
    container_name: multi-llm-rotator
    restart: unless-stopped

    # Load all API keys from .env file (never hard-code them here!)
    env_file:
      - .env

    # Extra environment overrides (optional)
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_LEVEL=INFO
      # Default rotation strategy: round-robin | least-used | random
      - LLM_STRATEGY=round-robin

    # Port for optional future REST API / health endpoint
    # The setup.bat will auto-detect port conflicts and remap if needed.
    ports:
      - "${LLM_PORT:-8765}:8765"

    volumes:
      # Persist account state (rate-limit cooldowns, usage counters)
      - rotator_data:/app/data
      # Mount your own scripts for live-editing without rebuild
      - ./examples:/app/examples:ro

    healthcheck:
      test: ["CMD", "python", "-c", "import multi_llm_rotator; print('ok')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  rotator_data:
    driver: local
